version: '3.8'

# Production Environment Configuration
# Supports multiple SSL certificate strategies

services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    expose:
      - "8000"
    volumes:
      - ../data:/app/data
      - ../logs:/app/logs
      # Production secrets (if using Docker secrets)
      - ../secrets:/run/secrets:ro
    environment:
     
      # Production Mode
      - DEBUG=False
      
      # CORS Configuration for Production
      # IMPORTANT: Update this to your actual domain
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://yourdomain.com}
      - ALLOWED_METHODS=GET,POST,DELETE,PUT,OPTIONS
      - ALLOWED_HEADERS=Content-Type,Authorization,LLM-API-Key,LLM-Provider,LLM-Base-URL,LLM-Model,Cache-Control,Connection
      
      # Model Configuration
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - CHAT_MODEL=${CHAT_MODEL:-gpt-3.5-turbo}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-ada-002}
      
      # Security Configuration
      - ENABLE_QUOTA_LIMIT=${ENABLE_QUOTA_LIMIT:-True}
      - DEFAULT_DAILY_QUOTA=${DEFAULT_DAILY_QUOTA:-5}
    env_file:
      - ../.env.production
    restart: unless-stopped
    networks:
      - rag_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    expose:
      - "8501"
    depends_on:
      - backend
    environment:
      # Frontend accesses backend via internal network
      - BACKEND_URL=http://backend:8000
    restart: unless-stopped
    networks:
      - rag_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    container_name: rag-kb-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Nginx configuration (use production config)
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      
      # SSL Certificates
      # OPTION 1: Let's Encrypt
      # - ./certbot/conf:/etc/letsencrypt:ro
      # - ./certbot/www:/var/www/certbot:ro
      
      # OPTION 2: Cloud Provider Certificates
      # - ./nginx/certs:/etc/nginx/certs:ro
      
      # Nginx logs
      - ../logs/nginx:/var/log/nginx
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - rag_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # OPTIONAL: Certbot for Let's Encrypt (if using Option 1)
  # Uncomment if you're using Let's Encrypt for SSL certificates
  # certbot:
  #   image: certbot/certbot
  #   volumes:
  #     - ./certbot/conf:/etc/letsencrypt
  #     - ./certbot/www:/var/www/certbot
  #   entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
  #   networks:
  #     - rag_network

networks:
  rag_network:
    driver: bridge

volumes:
  app_data:
    driver: local



