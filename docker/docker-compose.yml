
services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    # 生产环境不要为backend配置ports
    # 8000仅允许docker网络内的nginx、frontend访问
    expose:
      - "8000"
    networks:
      - rag_network
    volumes:
      - ../data:/app/data
      - ../logs:/app/logs
    environment:
      # 存储配置
      - CHROMA_DB_PATH=/app/data/chroma_db
      - UPLOAD_DIR=/app/data/uploads
      
     
      # CORS配置（生产环境需要指定具体域名）
      
      
      - ALLOWED_HEADERS=Content-Type,Authorization,LLM-API-Key,LLM-Provider,LLM-Base-URL,LLM-Model,Cache-Control,Connection
      - ALLOWED_METHODS=GET,POST,DELETE,PUT,OPTIONS
    
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    expose:
      - "8501"
    networks:
      - rag_network
    depends_on:
      - backend
    environment:
      - BACKEND_URL=http://backend:8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  rag_network: