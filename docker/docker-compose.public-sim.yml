# Local public-like simulation environment
# Use with base compose:
#   docker compose -f docker-compose.yml -f docker-compose.public-sim.yml up -d --build

services:
  backend:
    env_file:
      - ../.env.public-sim
    environment:
      # Override the base compose API_KEY expansion and force file-based secrets.
      API_KEY: ""
      
    volumes:
      - ../secrets:/run/secrets:ro
    networks:
      - rag_network

  frontend:
    env_file:
      - ../.env.public-sim
    environment:
      BACKEND_URL: http://backend:8000
      BACKEND_URL_CLIENT: https://local.rag-kb.dev
    networks:
      - rag_network
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: rag-kb-nginx-public-sim
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d/public-sim.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ../logs/nginx:/var/log/nginx
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - rag_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://backend:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
