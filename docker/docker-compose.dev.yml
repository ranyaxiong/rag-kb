services:
  backend:
    
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ../app:/app/app  # 挂载源代码，支持热重载
      - ../data:/app/data
      - ../logs:/app/logs
      - ../secrets:/run/secrets:ro
    
    env_file:
      - ../.env.dev
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    restart: unless-stopped

  frontend:
    
    ports:
      - "127.0.0.1:8501:8501"
    volumes:
      - ../frontend:/app/frontend  # 挂载源代码，支持热重载
    depends_on:
      - backend
    environment:
      - BACKEND_URL=http://backend:8000
      - BACKEND_URL_CLIENT=http://localhost:8000
    restart: unless-stopped

volumes:
  app_data:
    driver: local